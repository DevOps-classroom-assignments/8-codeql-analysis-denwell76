name: CodeQL + Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
        matrix:
          language: ['go']

      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker Image
        run: docker build -t go-web-server .
      
      - name: Run container
        run: docker run -d -p 8080:8080 go-web-server
        
      - name: Wait for server to start
        run: sleep 5

      - name: Test endpoint
        run: curl "http://localhost:8080/readfile?file=hello.txt"


      
    # Use ubuntu-latest for the analysis job
    # Define permissions for the job
    # Define language to be analyzed
    

  docker:
    name: Docker Build & Run
    runs-on: ubuntu-latest
    needs: analyze

    # Define steps to build and run the Docker container
